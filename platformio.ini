[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_build.partitions = no_ota_8mb.csv
board_build.filesystem = littlefs

build_src_filter =
    +<*>
    +<buddies/>
    +<hw/>
    -<main.cpp.m5stick.bak>
    -<xfer.h>
    -<ble_bridge.cpp>
    -<ble_bridge_nimble.cpp>

lib_deps =
    moononournation/GFX Library for Arduino
    lewisxhe/XPowersLib
    lewisxhe/SensorLib
    adafruit/Adafruit BusIO
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    olikraus/U8g2 @ ^2.35

[env:waveshare-esp32s3-touch-amoled-1-8]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_src_filter = ${env.build_src_filter} +<ble_bridge.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DXPOWERS_CHIP_AXP2101
    -DU8G2_USE_LARGE_FONTS
    -DU8G2_FONT_SUPPORT
    -DBOARD_WAVESHARE_ESP32S3_TOUCH_AMOLED_1_8

[env:waveshare-esp32s3-touch-amoled-1-75c]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_src_filter = ${env.build_src_filter} +<ble_bridge.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DXPOWERS_CHIP_AXP2101
    -DU8G2_USE_LARGE_FONTS
    -DU8G2_FONT_SUPPORT
    -DBOARD_WAVESHARE_ESP32S3_TOUCH_AMOLED_1_75C

[env:waveshare-esp32c6-touch-amoled-2-16]
board = esp32-c6-devkitc-1
board_build.mcu = esp32c6
board_build.f_cpu = 160000000L
board_build.flash_mode = qio
; No psram_type, no arduino.memory_type — C6 has no PSRAM.
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DXPOWERS_CHIP_AXP2101
    -DU8G2_USE_LARGE_FONTS
    -DU8G2_FONT_SUPPORT
    -DBOARD_WAVESHARE_ESP32C6_TOUCH_AMOLED_2_16
build_src_filter = ${env.build_src_filter} +<ble_bridge_nimble.cpp>
lib_deps =
    ${env.lib_deps}
    h2zero/NimBLE-Arduino @ ^2.0
lib_ignore =
    Adafruit_XCA9554
    Arduino_DriveBus

[env:waveshare-esp32c6-lcd-1-47]
board = esp32-c6-devkitc-1
board_build.mcu = esp32c6
board_build.f_cpu = 160000000L
board_build.flash_mode = qio
; 4 MB flash (no PSRAM). Custom no-OTA partition: 2.5 MB app + 1.4 MB SPIFFS.
; default.csv (1.28 MB app) is too small once chill7-font handling + buddy
; ASCII-vs-UI font split are in.
board_upload.flash_size = 4MB
board_build.partitions = no_ota_4mb.csv
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DU8G2_USE_LARGE_FONTS
    -DU8G2_FONT_SUPPORT
    -DBOARD_WAVESHARE_ESP32C6_LCD_1_47
build_src_filter = ${env.build_src_filter} +<ble_bridge_nimble.cpp>
lib_deps =
    moononournation/GFX Library for Arduino
    adafruit/Adafruit BusIO
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    olikraus/U8g2 @ ^2.35
    h2zero/NimBLE-Arduino @ ^2.0
lib_ignore =
    Adafruit_XCA9554
    Arduino_DriveBus
    XPowersLib
    SensorLib

[env:waveshare-esp32s3-touch-amoled-2-16]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DXPOWERS_CHIP_AXP2101
    -DU8G2_USE_LARGE_FONTS
    -DU8G2_FONT_SUPPORT
    -DBOARD_WAVESHARE_ESP32S3_TOUCH_AMOLED_2_16
build_src_filter = ${env.build_src_filter} +<ble_bridge.cpp>
